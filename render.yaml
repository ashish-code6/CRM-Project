services:
  - type: web
    name: crm-system-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npm run build && npm run migrate:deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CLIENT_URL
        sync: false
